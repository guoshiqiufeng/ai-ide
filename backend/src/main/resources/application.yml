server:
  port: 8080

spring:
  application:
    name: ai-ide-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_ide
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  ai:
    openai:
      api-key: ${AI_API_KEY:sk-placeholder}
      base-url: ${AI_BASE_URL:https://api.openai.com}

logging:
  level:
    com.aiide: DEBUG
